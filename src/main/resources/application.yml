server:
  port: ${PORT:8080}

spring:
  ai:
    openai:
      api-key: ${LLM_API_KEY:}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      connect-timeout: 10s
      read-timeout: 60s
      chat:
        options:
          model: ${LLM_MODEL:gpt-5-nano}
    mcp:
      client:
        enabled: false

agent:
  agents-md-path: ${AGENTS_MD_PATH:./AGENTS.md}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agent00code: INFO
    org.springframework.ai: INFO
    org.springframework.ai.openai: DEBUG
    org.springaicommunity.tool: DEBUG
