---
applications:
  - name: agent-00code
    memory: 1G
    disk_quota: 512M
    instances: 1
    path: target/agent-00code-0.1.0.jar
    buildpacks:
      - java_buildpack_offline
    services:
      - agent-00code-model
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      JAVA_OPTS: '-Djava.security.egd=file:///dev/urandom'
    processes:
      - type: web
        health-check-type: http
        health-check-http-endpoint: /actuator/health
        instances: 1
        memory: 1G
      - type: worker
        command: $HOME/.java-buildpack/open_jdk_jre/bin/java $JAVA_OPTS -cp $PWD/.:$PWD/.java-buildpack/container_security_provider/container_security_provider-*.jar org.springframework.boot.loader.launch.JarLauncher --spring.main.web-application-type=none
        health-check-type: process
        instances: 1
        memory: 512M
        no-route: true
