server:
  port: ${PORT:8080}

spring:
  autoconfigure:
    exclude: ${EXCLUDE_AUTOCONFIG:org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration}
  ai:
    openai:
      api-key: ${LLM_API_KEY:}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${LLM_MODEL:}
    google:
      genai:
        api-key: ${GOOGLE_API_KEY:}
        chat:
          options:
            model: ${GOOGLE_MODEL:}
    mcp:
      client:
        enabled: false

agent:
  agents-md-path: ${AGENTS_MD_PATH:./AGENTS.md}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agent00code: INFO
    org.springframework.ai: INFO
    org.springframework.ai.openai: DEBUG
    org.springaicommunity.tool: DEBUG
